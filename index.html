<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TripSplitter Beta 1.7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8f9fa; }
        .modal-blur { backdrop-filter: blur(8px); background-color: rgba(0, 0, 0, 0.4); }
        .custom-input {
            background-color: #f4f7f9;
            border: 2px solid transparent;
            border-radius: 1rem;
            padding: 0.75rem 1rem;
            font-weight: 700;
            outline: none;
            width: 100%;
            transition: border-color 0.2s;
        }
        .custom-input:focus { border-color: #6366f1; }
        .nav-btn.active { color: #4f46e5; }
        .member-chip.selected { background-color: #4f46e5; color: white; border-color: #4f46e5; }
        .currency-select {
            background-color: #f4f7f9;
            border-radius: 1rem;
            padding: 0 8px;
            font-weight: 800;
            font-size: 13px;
            border: 2px solid #f1f5f9;
            height: 100%;
            min-width: 100px;
        }
        .page-content { display: none; flex: 1; padding-bottom: 120px; }
        .page-content.active { display: flex; flex-direction: column; }
    </style>
</head>
<body class="text-slate-800">

    <div id="app" class="max-w-md mx-auto min-h-screen bg-white shadow-2xl relative flex flex-col">
        
        <!-- Header -->
        <header class="p-4 flex justify-between items-center bg-white sticky top-0 z-40 border-b border-slate-50">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white text-sm">
                    <i class="fas fa-paper-plane"></i>
                </div>
                <h1 class="text-lg font-black tracking-tight text-indigo-900">TripSplitter</h1>
            </div>
            <button onclick="openModal('poolModal')" class="bg-orange-50 px-3 py-1.5 rounded-xl border border-orange-100 flex flex-col items-end shadow-sm active:scale-95 transition-transform">
                <span class="text-[8px] font-black text-orange-400 uppercase tracking-wider">Pool 餘額</span>
                <span class="text-xs font-black text-orange-600" id="headerPoolVal">0 TWD</span>
            </button>
        </header>

        <!-- Home Page -->
        <main id="pageHome" class="page-content active px-6 pt-6">
            <div class="bg-indigo-900 rounded-[2.5rem] p-7 text-white mb-8 shadow-xl relative overflow-hidden">
                <div class="relative z-10">
                    <p class="text-indigo-200 text-[10px] font-bold mb-1 uppercase tracking-widest">行程總支出 (TWD)</p>
                    <div id="totalDisplay" class="text-4xl font-black mb-4">$ 0</div>
                    <div class="flex gap-3 text-[11px] font-medium text-indigo-100">
                        <span id="statCount">0 筆活動</span>
                        <span class="opacity-30">|</span>
                        <span id="statMembers">0 位夥伴</span>
                    </div>
                </div>
                <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-white/5 rounded-full"></div>
            </div>

            <section>
                <div class="flex justify-between items-end mb-4 px-1">
                    <h2 class="font-black text-xl">支出活動</h2>
                    <span class="text-[10px] font-bold text-slate-300 uppercase">Records</span>
                </div>
                <div id="logContainer" class="space-y-3 pb-4"></div>
            </section>
        </main>

        <!-- Members Page -->
        <main id="pageMembers" class="page-content px-6 pt-6">
            <h2 class="font-black text-2xl mb-2 text-indigo-900">旅伴清單</h2>
            <div id="memberListContainer" class="grid grid-cols-1 gap-3 mt-4"></div>
            
            <div class="mt-8 bg-slate-50 p-5 rounded-3xl border border-dashed border-slate-200">
                <p class="text-[10px] font-black text-slate-400 mb-3 uppercase tracking-widest text-center">新增成員</p>
                <div class="flex gap-3 mb-4">
                    <button onclick="toggleEmojiPicker('newMemberEmoji')" id="newMemberAvatarBtn" class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center text-2xl border border-slate-100">😎</button>
                    <input type="text" id="newMemberName" placeholder="姓名" class="flex-1 custom-input h-14 bg-white">
                </div>
                <div id="newMemberEmojiPicker" class="hidden grid grid-cols-6 gap-2 mb-4 p-3 bg-white rounded-2xl border border-slate-100"></div>
                <button onclick="addNewMember()" class="w-full py-3 bg-indigo-600 text-white rounded-2xl font-black">加入成員</button>
            </div>
        </main>

        <!-- Settle Page -->
        <main id="pageSettle" class="page-content px-6 pt-6 bg-slate-50">
            <h2 class="font-black text-2xl mb-2 text-indigo-900">結算對帳</h2>
            <div id="settleContent" class="space-y-6"></div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white border-t border-slate-100 flex justify-around items-center h-24 px-4 z-50">
            <button onclick="switchTab('Home')" id="btnHome" class="nav-btn active flex flex-col items-center gap-1 flex-1">
                <div class="w-10 h-10 flex items-center justify-center rounded-xl"><i class="fas fa-th-large text-xl"></i></div>
                <span class="text-[10px] font-black uppercase">活動</span>
            </button>
            <button onclick="switchTab('Members')" id="btnMembers" class="nav-btn text-slate-300 flex flex-col items-center gap-1 flex-1">
                <div class="w-10 h-10 flex items-center justify-center rounded-xl"><i class="fas fa-users text-xl"></i></div>
                <span class="text-[10px] font-black uppercase">成員</span>
            </button>
            <div class="relative w-16">
                <button onclick="openModal('expenseModal')" class="absolute -top-12 left-0 w-16 h-16 bg-indigo-600 rounded-3xl text-white shadow-lg flex items-center justify-center active:scale-90 transition-transform">
                    <i class="fas fa-plus text-2xl"></i>
                </button>
            </div>
            <button onclick="switchTab('Settle')" id="btnSettle" class="nav-btn text-slate-300 flex flex-col items-center gap-1 flex-1">
                <div class="w-10 h-10 flex items-center justify-center rounded-xl"><i class="fas fa-wallet text-xl"></i></div>
                <span class="text-[10px] font-black uppercase">結算</span>
            </button>
        </nav>

        <!-- Modals Overlay -->
        <div id="modalOverlay" class="fixed inset-0 modal-blur z-[100] hidden items-center justify-center p-4">
            
            <!-- Expense Modal -->
            <div id="expenseModal" class="bg-white w-full max-w-[400px] max-h-[90vh] overflow-y-auto rounded-[2.5rem] p-7 hidden flex-col shadow-2xl">
                <div class="flex justify-between items-center mb-6">
                    <h3 id="expModalTitle" class="text-xl font-black text-indigo-900">新增支出</h3>
                    <button onclick="closeModals()" class="text-slate-300"><i class="fas fa-times-circle text-2xl"></i></button>
                </div>
                
                <!-- Category Select -->
                <div class="flex justify-between mb-6 gap-2" id="catRow"></div>

                <div class="flex gap-2 mb-3 h-14">
                    <select id="expCur" class="currency-select shadow-sm"></select>
                    <input type="number" id="expAmt" placeholder="金額" class="flex-1 custom-input h-full">
                </div>
                <input type="text" id="expNote" placeholder="支出項目 (例: 午餐)" class="custom-input mb-4 h-14">
                
                <div class="mb-4">
                    <p class="text-[10px] font-black text-slate-300 mb-2 uppercase tracking-widest">付款方式</p>
                    <select id="expPayer" class="custom-input h-14 text-indigo-600 font-bold bg-indigo-50/50"></select>
                </div>
                
                <div class="mb-8">
                    <p class="text-[10px] font-black text-slate-300 mb-2 uppercase tracking-widest">分攤成員</p>
                    <div id="partiList" class="flex flex-wrap gap-2"></div>
                </div>

                <div class="flex gap-2">
                    <button id="expDeleteBtn" onclick="deleteExpense()" class="hidden flex-1 py-4 bg-red-50 text-red-500 rounded-[1.25rem] font-black">刪除</button>
                    <button onclick="saveExpense()" class="flex-[2] py-4 bg-indigo-600 text-white rounded-[1.25rem] font-black shadow-lg">儲存紀錄</button>
                </div>
            </div>

            <!-- Pool Modal -->
            <div id="poolModal" class="bg-white w-full max-w-[380px] max-h-[90vh] overflow-y-auto rounded-[2.5rem] p-7 hidden flex-col shadow-2xl">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-black text-orange-900">公積金錢包</h3>
                    <button onclick="closeModals()" class="text-slate-300"><i class="fas fa-times-circle text-2xl"></i></button>
                </div>
                <div class="bg-gradient-to-br from-orange-400 to-orange-600 rounded-3xl p-6 text-white mb-6 shadow-lg shadow-orange-100">
                    <p class="text-[10px] font-bold text-orange-100 mb-1 uppercase tracking-widest">目前總值估計</p>
                    <div class="text-3xl font-black" id="modalPoolVal">0 TWD</div>
                    <div id="poolCurDetails" class="mt-2 text-[10px] text-orange-50/60 font-medium"></div>
                </div>
                <p class="text-[10px] font-black text-slate-300 mb-2 uppercase tracking-widest">存入公積金</p>
                <div class="flex gap-2 h-14 mb-4">
                    <select id="poolCur" class="currency-select border-orange-100 shadow-sm"></select>
                    <input type="number" id="poolAmt" placeholder="金額" class="flex-1 custom-input h-full">
                </div>
                <button onclick="addPoolMoney()" class="w-full py-4 bg-orange-500 text-white rounded-[1.25rem] font-black active:scale-95 mb-6">確認存入</button>
                
                <p class="text-[10px] font-black text-slate-300 mb-3 uppercase tracking-widest">存入歷史</p>
                <div id="poolHistory" class="space-y-2 max-h-40 overflow-y-auto pr-1"></div>
            </div>

            <!-- Member Edit Modal -->
            <div id="memberEditModal" class="bg-white w-full max-w-[380px] rounded-[2.5rem] p-7 hidden flex-col shadow-2xl">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-black text-indigo-900">編輯成員</h3>
                    <button onclick="closeModals()" class="text-slate-300"><i class="fas fa-times-circle text-2xl"></i></button>
                </div>
                <div class="flex justify-center mb-6">
                    <button onclick="toggleEmojiPicker('editMemberEmoji')" id="editMemberAvatarBtn" class="w-20 h-20 bg-indigo-50 rounded-3xl flex items-center justify-center text-4xl">😎</button>
                </div>
                <div id="editMemberEmojiPicker" class="hidden grid grid-cols-6 gap-2 mb-6 p-3 bg-slate-50 rounded-2xl border border-slate-100"></div>
                <input type="text" id="editMemberName" class="custom-input mb-8 h-14 text-center text-xl" placeholder="輸入名稱">
                <div class="flex gap-3">
                    <button onclick="deleteMember()" class="flex-1 py-4 bg-red-50 text-red-500 rounded-[1.25rem] font-black">刪除</button>
                    <button onclick="saveMemberEdit()" class="flex-[2] py-4 bg-indigo-600 text-white rounded-[1.25rem] font-black">儲存</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const emojis = ['😎','✨','🦊','🦁','🐱','🐻','🐹','🐼','🐨','🦄','🐲','🐸','🐧','🐙','🦋','🥑','🍕','⭐'];
        const currencyList = [
            { code: 'TWD', flag: '🇹🇼', label: '台幣' },
            { code: 'USD', flag: '🇺🇸', label: '美元' },
            { code: 'EUR', flag: '🇪🇺', label: '歐元' },
            { code: 'JPY', flag: '🇯🇵', label: '日圓' },
            { code: 'KRW', flag: '🇰🇷', label: '韓元' },
            { code: 'THB', flag: '🇹🇭', label: '泰銖' },
            { code: 'CNY', flag: '🇨🇳', label: '人民幣' }
        ];

        let state = {
            poolBalances: { "TWD": 0, "USD": 0, "EUR": 0, "JPY": 0, "KRW": 0, "THB": 0, "CNY": 0 },
            poolLogs: [],
            members: [
                { id: 'm1', name: '小明', avatar: '😎' },
                { id: 'm2', name: '小美', avatar: '✨' },
                { id: 'm3', name: '阿強', avatar: '🦊' }
            ],
            expenses: [],
            selectedCat: 'food',
            rates: { "TWD": 1, "USD": 32.5, "EUR": 35.2, "JPY": 0.21, "KRW": 0.024, "THB": 0.92, "CNY": 4.5 },
            cats: [
                { id: 'food', icon: '🍱', label: '餐飲' },
                { id: 'stay', icon: '🏨', label: '住宿' },
                { id: 'move', icon: '🚌', label: '交通' },
                { id: 'shop', icon: '🛍️', label: '購物' }
            ],
            editingExpenseId: null,
            editingMemberId: null,
            tempAvatar: '😎'
        };

        function switchTab(tabName) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.getElementById('page' + tabName).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.remove('active');
                b.classList.replace('text-indigo-600', 'text-slate-300');
            });
            const activeBtn = document.getElementById('btn' + tabName);
            activeBtn.classList.add('active');
            activeBtn.classList.replace('text-slate-300', 'text-indigo-600');

            if(tabName === 'Settle') updateSettlement();
            if(tabName === 'Members') updateMemberPage();
        }

        function openModal(id, editId = null) {
            document.getElementById('modalOverlay').classList.remove('hidden');
            document.getElementById('modalOverlay').classList.add('flex');
            ['expenseModal', 'poolModal', 'memberEditModal'].forEach(m => document.getElementById(m).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');

            if(id === 'expenseModal') {
                state.editingExpenseId = editId;
                const ex = editId ? state.expenses.find(e => e.id === editId) : null;
                // 初始化分類
                state.selectedCat = ex ? state.cats.find(c => c.icon === ex.icon).id : 'food';
                initExpenseForm(editId);
            }
            if(id === 'poolModal') initPoolModal();
        }

        function closeModals() {
            document.getElementById('modalOverlay').classList.replace('flex', 'hidden');
        }

        function initCurrencySelects() {
            const options = currencyList.map(c => `<option value="${c.code}">${c.flag} ${c.code}</option>`).join('');
            document.getElementById('expCur').innerHTML = options;
            document.getElementById('poolCur').innerHTML = options;
        }

        // --- Expense Logic ---
        function initExpenseForm(editId) {
            const isEdit = editId !== null;
            const ex = isEdit ? state.expenses.find(e => e.id === editId) : null;
            
            document.getElementById('expModalTitle').innerText = isEdit ? '編輯支出' : '新增支出';
            document.getElementById('expDeleteBtn').classList.toggle('hidden', !isEdit);
            
            if(isEdit) {
                document.getElementById('expAmt').value = ex.amt;
                document.getElementById('expCur').value = ex.cur;
                document.getElementById('expNote').value = ex.note;
            } else {
                document.getElementById('expAmt').value = '';
                document.getElementById('expNote').value = '';
            }

            // Render Category Buttons
            document.getElementById('catRow').innerHTML = state.cats.map(c => `
                <button onclick="state.selectedCat='${c.id}'; initExpenseForm(${editId})" class="flex-1 h-20 rounded-2xl flex flex-col items-center justify-center gap-1 transition-all ${state.selectedCat === c.id ? 'bg-indigo-600 text-white shadow-lg' : 'bg-slate-50 text-slate-400'}">
                    <span class="text-xl">${c.icon}</span>
                    <span class="text-[10px] font-black">${c.label}</span>
                </button>
            `).join('');

            const payer = document.getElementById('expPayer');
            payer.innerHTML = '<option value="pool">💰 公積金錢包</option>' + state.members.map(m => `<option value="${m.id}" ${isEdit && ex.payer === m.id ? 'selected' : ''}>${m.avatar} ${m.name}</option>`).join('');
            if(isEdit && ex.payer === 'pool') payer.value = 'pool';

            document.getElementById('partiList').innerHTML = state.members.map(m => `
                <button onclick="this.classList.toggle('selected')" data-uid="${m.id}" class="member-chip ${!isEdit || ex.participants.includes(m.id) ? 'selected' : ''} px-3 py-2 bg-slate-50 rounded-xl text-xs font-bold border border-slate-100 transition-all flex items-center gap-1">
                    ${m.avatar} ${m.name}
                </button>
            `).join('');
        }

        function saveExpense() {
            const amt = parseFloat(document.getElementById('expAmt').value) || 0;
            const cur = document.getElementById('expCur').value;
            const note = document.getElementById('expNote').value || '未命名項目';
            const payer = document.getElementById('expPayer').value;
            const participants = Array.from(document.querySelectorAll('#partiList .member-chip.selected')).map(el => el.dataset.uid);

            if(amt <= 0 || participants.length === 0) return;

            if(payer === 'pool') {
                if(state.editingExpenseId) {
                    const oldEx = state.expenses.find(e => e.id === state.editingExpenseId);
                    if(oldEx.payer === 'pool') state.poolBalances[oldEx.cur] += oldEx.amt;
                }
                state.poolBalances[cur] -= amt;
            } else if(state.editingExpenseId) {
                const oldEx = state.expenses.find(e => e.id === state.editingExpenseId);
                if(oldEx.payer === 'pool') state.poolBalances[oldEx.cur] += oldEx.amt;
            }

            const twdAmt = amt * state.rates[cur];
            const expenseData = {
                id: state.editingExpenseId || Date.now(),
                icon: state.cats.find(c => c.id === state.selectedCat).icon,
                note, amt, cur, twdAmt, payer, participants,
                time: state.editingExpenseId ? state.expenses.find(e => e.id === state.editingExpenseId).time : new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            };

            if(state.editingExpenseId) {
                const idx = state.expenses.findIndex(e => e.id === state.editingExpenseId);
                state.expenses[idx] = expenseData;
            } else {
                state.expenses.unshift(expenseData);
            }

            updateUI();
            closeModals();
        }

        function deleteExpense() {
            const ex = state.expenses.find(e => e.id === state.editingExpenseId);
            if(ex && ex.payer === 'pool') state.poolBalances[ex.cur] += ex.amt;
            state.expenses = state.expenses.filter(e => e.id !== state.editingExpenseId);
            updateUI();
            closeModals();
        }

        // --- Pool Logic ---
        function initPoolModal() {
            const logContainer = document.getElementById('poolHistory');
            logContainer.innerHTML = state.poolLogs.length === 0 ? '<p class="text-center text-slate-300 text-[10px] py-4 font-bold">尚無存款紀錄</p>' : 
            state.poolLogs.map(l => `
                <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl">
                    <span class="text-xs font-black text-slate-600">存入 ${l.time}</span>
                    <div class="text-xs font-black text-orange-600">+ ${l.amt.toLocaleString()} ${l.cur}</div>
                </div>
            `).join('');

            const details = Object.entries(state.poolBalances)
                .filter(([cur, bal]) => bal > 0)
                .map(([cur, bal]) => `${bal.toLocaleString()} ${cur}`)
                .join(' / ');
            document.getElementById('poolCurDetails').innerText = details || '餘額皆為 0';
        }

        function addPoolMoney() {
            const amt = parseFloat(document.getElementById('poolAmt').value) || 0;
            const cur = document.getElementById('poolCur').value;
            if(amt <= 0) return;
            state.poolBalances[cur] += amt;
            state.poolLogs.unshift({ amt, cur, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) });
            document.getElementById('poolAmt').value = '';
            updateUI();
            initPoolModal();
        }

        // --- Member Logic ---
        function updateMemberPage() {
            const container = document.getElementById('memberListContainer');
            container.innerHTML = state.members.map(m => `
                <div onclick="openMemberEdit('${m.id}')" class="bg-white p-5 rounded-[1.5rem] border border-slate-100 flex items-center justify-between shadow-sm active:scale-95 transition-transform cursor-pointer">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-indigo-50 rounded-2xl flex items-center justify-center text-2xl">${m.avatar}</div>
                        <div><span class="font-black text-slate-700 block">${m.name}</span><span class="text-[9px] text-slate-300 font-bold">點擊修改</span></div>
                    </div>
                    <i class="fas fa-edit text-slate-200"></i>
                </div>
            `).join('');
            initEmojiPicker('newMemberEmojiPicker', (e) => {
                state.tempAvatar = e;
                document.getElementById('newMemberAvatarBtn').innerText = e;
                document.getElementById('newMemberEmojiPicker').classList.add('hidden');
            });
        }

        function initEmojiPicker(id, onPick) {
            document.getElementById(id).innerHTML = emojis.map(e => `
                <button onclick="(${onPick.toString()})('${e}')" class="w-10 h-10 flex items-center justify-center text-xl hover:bg-white rounded-lg">${e}</button>
            `).join('');
        }

        function toggleEmojiPicker(type) {
            const id = type === 'newMemberEmoji' ? 'newMemberEmojiPicker' : 'editMemberEmojiPicker';
            document.getElementById(id).classList.toggle('hidden');
        }

        function addNewMember() {
            const name = document.getElementById('newMemberName').value.trim();
            if(!name) return;
            state.members.push({ id: 'm' + Date.now(), name, avatar: state.tempAvatar });
            document.getElementById('newMemberName').value = '';
            updateMemberPage();
            updateUI();
        }

        function openMemberEdit(id) {
            state.editingMemberId = id;
            const m = state.members.find(m => m.id === id);
            document.getElementById('editMemberAvatarBtn').innerText = m.avatar;
            document.getElementById('editMemberName').value = m.name;
            state.tempAvatar = m.avatar;
            initEmojiPicker('editMemberEmojiPicker', (e) => {
                state.tempAvatar = e;
                document.getElementById('editMemberAvatarBtn').innerText = e;
                document.getElementById('editMemberEmojiPicker').classList.add('hidden');
            });
            openModal('memberEditModal');
        }

        function saveMemberEdit() {
            const m = state.members.find(m => m.id === state.editingMemberId);
            m.name = document.getElementById('editMemberName').value;
            m.avatar = state.tempAvatar;
            updateMemberPage();
            updateUI();
            closeModals();
        }

        function deleteMember() {
            state.members = state.members.filter(m => m.id !== state.editingMemberId);
            updateMemberPage();
            updateUI();
            closeModals();
        }

        // --- Global UI ---
        function updateUI() {
            let poolTwdTotal = 0;
            for(let [cur, bal] of Object.entries(state.poolBalances)) poolTwdTotal += bal * state.rates[cur];
            const displayPool = Math.max(0, Math.round(poolTwdTotal));
            document.getElementById('headerPoolVal').innerText = `${displayPool.toLocaleString()} TWD`;
            document.getElementById('modalPoolVal').innerText = `${displayPool.toLocaleString()} TWD`;

            const totalTwd = Math.round(state.expenses.reduce((s, e) => s + e.twdAmt, 0));
            document.getElementById('totalDisplay').innerText = `$ ${totalTwd.toLocaleString()}`;
            document.getElementById('statCount').innerText = `${state.expenses.length} 筆活動`;
            document.getElementById('statMembers').innerText = `${state.members.length} 位夥伴`;

            const log = document.getElementById('logContainer');
            log.innerHTML = state.expenses.length === 0 ? '<div class="text-center py-20 opacity-20"><p class="font-black">尚無支出紀錄</p></div>' : 
            state.expenses.map(ex => `
                <div onclick="openModal('expenseModal', ${ex.id})" class="bg-white p-4 rounded-2xl flex items-center gap-3 border border-slate-100 shadow-sm active:scale-95 transition-transform cursor-pointer">
                    <div class="w-12 h-12 rounded-2xl bg-slate-50 flex items-center justify-center text-xl">${ex.icon}</div>
                    <div class="flex-1 min-w-0">
                        <h4 class="font-black text-sm text-slate-700 truncate">${ex.note}</h4>
                        <span class="text-[9px] ${ex.payer === 'pool' ? 'text-orange-400' : 'text-indigo-400'} font-black uppercase tracking-widest">${ex.payer === 'pool' ? '公積金' : '墊付'} · ${ex.time}</span>
                    </div>
                    <div class="text-right">
                        <div class="font-black text-sm text-slate-900">${ex.amt.toLocaleString()} ${ex.cur}</div>
                        <div class="text-[9px] text-slate-300 font-bold">≈ ${Math.round(ex.twdAmt).toLocaleString()} TWD</div>
                    </div>
                </div>
            `).join('');
        }

        function updateSettlement() {
            const container = document.getElementById('settleContent');
            let currencies = [...new Set(state.expenses.map(e => e.cur))];
            if(currencies.length === 0) {
                container.innerHTML = '<div class="text-center py-20 opacity-20 font-black">無須結算</div>';
                return;
            }
            container.innerHTML = currencies.map(cur => {
                let balances = {};
                state.members.forEach(m => balances[m.id] = 0);
                state.expenses.filter(e => e.cur === cur && e.payer !== 'pool').forEach(ex => {
                    const perShare = ex.amt / ex.participants.length;
                    balances[ex.payer] += ex.amt;
                    ex.participants.forEach(uid => balances[uid] -= perShare);
                });
                let debtors = [], creditors = [];
                for (let id in balances) {
                    if (balances[id] < -0.01) debtors.push({ id, amt: Math.abs(balances[id]) });
                    else if (balances[id] > 0.01) creditors.push({ id, amt: balances[id] });
                }
                let paths = [];
                let d = 0, c = 0;
                while (d < debtors.length && c < creditors.length) {
                    let transfer = Math.min(debtors[d].amt, creditors[c].amt);
                    paths.push({ from: debtors[d].id, to: creditors[c].id, amt: transfer });
                    debtors[d].amt -= transfer; creditors[c].amt -= transfer;
                    if (debtors[d].amt < 0.01) d++; if (creditors[c].amt < 0.01) c++;
                }
                return `
                    <div class="bg-white rounded-[2rem] overflow-hidden shadow-sm border border-slate-100 mb-6">
                        <div class="bg-indigo-50/50 p-5 font-black text-indigo-900 border-b border-indigo-100/50 flex justify-between">
                            <span>${currencyList.find(c => c.code === cur).flag} ${cur}</span>
                        </div>
                        <div class="p-6 space-y-4">
                            ${paths.length === 0 ? '<p class="text-center text-slate-300 text-xs py-2 font-bold">已結清</p>' : 
                                paths.map(p => {
                                    const fromU = state.members.find(m => m.id === p.from);
                                    const toU = state.members.find(m => m.id === p.to);
                                    return `<div class="flex items-center justify-between bg-slate-50 p-4 rounded-2xl">
                                        <div class="text-center"><div class="text-lg">${fromU.avatar}</div><div class="text-[10px] font-black">${fromU.name}</div></div>
                                        <div class="flex flex-col items-center">
                                            <div class="font-black text-indigo-600">${Math.ceil(p.amt).toLocaleString()} ${cur}</div>
                                            <i class="fas fa-arrow-right text-indigo-200"></i>
                                        </div>
                                        <div class="text-center"><div class="text-lg">${toU.avatar}</div><div class="text-[10px] font-black">${toU.name}</div></div>
                                    </div>`;
                                }).join('')
                            }
                        </div>
                    </div>`;
            }).join('');
        }

        window.onload = () => { initCurrencySelects(); updateUI(); updateMemberPage(); }
    </script>
</body>
</html>
