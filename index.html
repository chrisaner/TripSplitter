<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripSplitter - 旅遊分帳工具 (Beta 1.0)</title>
    <!-- 引入必要的外部庫 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <!-- 這裡必須指定 type="text/babel" 以讓 Babel 編譯 JSX -->
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // 圖示組件（處理 Lucide 在瀏覽器環境的載入）
        const Icon = ({ name, size = 24, className = "" }) => {
            const [iconElement, setIconElement] = useState(null);
            
            useEffect(() => {
                if (window.lucide && window.lucide.icons) {
                    const iconName = name.charAt(0).toUpperCase() + name.slice(1);
                    const LucideIcon = window.lucide.icons[iconName] || window.lucide.icons.HelpCircle;
                    // 建立簡單的 SVG 包裝
                    setIconElement(LucideIcon);
                }
            }, [name]);

            if (!iconElement) return <div style={{width: size, height: size}} className={className}></div>;
            
            // 使用 React.createElement 手動渲染以確保兼容性
            return React.createElement('i', {
                "data-lucide": name.toLowerCase(),
                className: className,
                style: { width: size, height: size, display: 'inline-block' },
                dangerouslySetInnerHTML: { __html: window.lucide.createIcons() } // 簡易觸發方式
            });
        };

        // 靜態資料
        const CURRENCIES = [
            { code: 'TWD', symbol: 'NT$', label: '台幣', flag: '🇹🇼' },
            { code: 'JPY', symbol: '¥', label: '日圓', flag: '🇯🇵' },
            { code: 'USD', symbol: '$', label: '美金', flag: '🇺🇸' }
        ];

        function App() {
            const [currentTab, setCurrentTab] = useState('dashboard');
            const [expenses, setExpenses] = useState([
                { id: 1, note: '機場接送', amount: 1200, currency: 'TWD', date: '2024-03-19', categoryId: 'transport', payerId: 'user1' }
            ]);
            const [members, setMembers] = useState([
                { id: 'user1', name: '小明', avatar: '😎' },
                { id: 'user2', name: '小華', avatar: '🐱' }
            ]);

            const totalSpentTWD = expenses.reduce((sum, exp) => sum + exp.amount, 0);

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white shadow-xl flex flex-col">
                    {/* Header */}
                    <header className="p-4 border-b flex justify-between items-center bg-white sticky top-0 z-10">
                        <div>
                            <h1 className="text-xl font-black text-emerald-600">TripSplitter</h1>
                            <p className="text-[10px] text-gray-400">Beta 1.0 (Live on GitHub)</p>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="p-4 flex-grow overflow-y-auto">
                        {currentTab === 'dashboard' && (
                            <div className="space-y-6">
                                <div className="bg-emerald-500 p-6 rounded-3xl text-white shadow-lg">
                                    <p className="opacity-80 text-xs">總支出 (TWD)</p>
                                    <h2 className="text-3xl font-black mt-1">$ {totalSpentTWD.toLocaleString()}</h2>
                                </div>

                                <div className="space-y-3">
                                    <h3 className="font-bold text-gray-700">最近支出</h3>
                                    {expenses.map(exp => (
                                        <div key={exp.id} className="p-4 bg-gray-50 rounded-2xl flex justify-between items-center border border-gray-100">
                                            <div>
                                                <p className="font-bold text-gray-800">{exp.note}</p>
                                                <p className="text-xs text-gray-400">{exp.date}</p>
                                            </div>
                                            <div className="text-right">
                                                <p className="font-bold text-emerald-600">{exp.amount} {exp.currency}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        
                        {currentTab === 'members' && (
                            <div className="space-y-4">
                                <h3 className="font-bold text-gray-700">旅行夥伴</h3>
                                {members.map(m => (
                                    <div key={m.id} className="p-4 bg-white border rounded-2xl flex items-center gap-4">
                                        <span className="text-2xl">{m.avatar}</span>
                                        <span className="font-bold">{m.name}</span>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* Navigation */}
                    <nav className="border-t p-4 flex justify-around bg-white">
                        <button onClick={() => setCurrentTab('dashboard')} className={`p-2 ${currentTab === 'dashboard' ? 'text-emerald-500' : 'text-gray-300'}`}>首頁</button>
                        <button onClick={() => setCurrentTab('members')} className={`p-2 ${currentTab === 'members' ? 'text-emerald-500' : 'text-gray-300'}`}>成員</button>
                        <button className="bg-emerald-500 text-white w-12 h-12 rounded-full flex items-center justify-center -mt-10 shadow-lg">+</button>
                        <button onClick={() => setCurrentTab('settle')} className={`p-2 ${currentTab === 'settle' ? 'text-emerald-500' : 'text-gray-300'}`}>結算</button>
                    </nav>
                </div>
            );
        }

        // 渲染應用程式
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
